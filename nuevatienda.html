<body class="form-page">
    <main class="form-shell">
	        <section class="panel nuevoshop">
	            <div class="section-heading">
	                <div>
	                    <p class="eyebrow">Repertoriu</p>
	                    <h2>Añadir tienda</h2>
	                </div>
	            </div>

	            <form id="form-tienda" class="stack-form">
	                <label for="nombre-tienda">Nome</label>
	                <input type="text" id="nombre-tienda" name="nombre" placeholder="Librairie du Centre" required>

	                <label for="tipo-tienda">Tienda</label>
	                <select id="tipo-tienda" name="tipo" required>
	                    <option value="">-- Escueye un tipu --</option>
	                    <option value="online">Online</option>
	                    <option value="fisica">Física</option>
	                </select>

	                <label for="web-tienda">Web</label>
	                <input type="url" id="web-tienda" name="web" placeholder="https://...">

	                <label for="direccion-tienda">Direición</label>
	                <input type="text" id="direccion-tienda" name="direccion" placeholder="12 Rue de la BD">

	                <label for="selector-pais">País</label>
	                <select id="selector-pais" name="pais">
	                    <option value="">-- Escueye un país --</option>
	                </select>

	                <label for="selector-ciudad">Ciudá</label>
	                <select id="selector-ciudad" name="ciudad" disabled>
	                    <option value="">-- Primero escueye país --</option>
	                </select>

	                <button type="submit" class="back-link">Guardar tienda</button>
	            </form>
           <a href="index.html" class="back-link" aria-label="Volver al inicio">
        <i class="fa-solid fa-arrow-left"></i> Volver
    </a>

        </section>
